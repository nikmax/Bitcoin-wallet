services:
  wallet-web:
    image: python:3.11-slim 
    container_name: bitcoin-wallet-web
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8000:8000"
    # If bitcoind runs on the Docker host:
    # Linux: use extra_hosts below and set BITCOIN_RPC_HOST=host.docker.internal
    #extra_hosts:
    #  - "host.docker.internal:host-gateway"
    volumes:
      - ./:/wallet
    command:
      - /wallet/start.sh
