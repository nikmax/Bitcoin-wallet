<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ settings.app_title }}</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<header class="topbar">
  <a class="brand" href="/">₿ Wallet Lab</a>
  {% if user %}
  <form method="post" action="/logout" class="logout"><button>Logout</button></form>
  {% endif %}
</header>

{% if user %}
<nav class="bottomnav">
  <a href="/">🏠<span>Status</span></a>
  <a href="/wallet">👛<span>Wallet</span></a>
  <a href="/users">👥<span>Nutzer</span></a>
  <a href="/send">↗️<span>Senden</span></a>
  <a href="/block">🧱<span>Blöcke</span></a>
</nav>
{% endif %}

<main class="container">
  {% if user %}<div class="userpill">Angemeldet als <strong>{{ user.username }}</strong></div>{% endif %}
  <div class="warning">{{ warning }}</div>
  {% block content %}{% endblock %}
</main>
</body>
</html>
