<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ settings.app_title }}</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<header class="topbar">
  <div>
    <strong>{{ settings.app_title }}</strong>
    {% if user %}<small>@{{ user.username }}</small>{% endif %}
  </div>
  {% if user %}
  <form method="post" action="/logout"><button class="linkbtn">Logout</button></form>
  {% endif %}
</header>
<main class="container">
  {% block content %}{% endblock %}
</main>
{% if user %}
<nav class="bottomnav">
  <a href="/">Home</a>
  <a href="/wallet">Wallet</a>
  <a href="/wallet/send">Senden</a>
  <a href="/explorer">Explorer</a>
</nav>
{% endif %}
</body>
</html>
