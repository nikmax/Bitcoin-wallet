<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{{ settings.app_title }}</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<header class="top">
  <div>
    <b>{{ settings.app_title }}</b>
    {% if user %}<small>{{ user.username }} · {{ account.name if account else 'kein Konto' }}</small>{% endif %}
  </div>
  {% if user %}<a href="/logout">Logout</a>{% endif %}
</header>
<main>{% block content %}{% endblock %}</main>
{% if user %}
<nav class="bottom">
  <a href="/">Home</a>
  <a href="/wallet">Wallet</a>
  <a href="/send">Senden</a>
  <a href="/sync">Sync</a>
  <a href="/backup">Konten</a>
</nav>
{% endif %}
</body>
</html>
