{% extends "base.html" %}
{% block content %}
<section class="card auth-card">
  <h1>Nutzer erstellen</h1>
  <p class="muted">Jeder Nutzer bekommt automatisch eine eigene App-Wallet-Adresse.</p>
  {% if error %}<div class="alert">{{ error }}</div>{% endif %}
  <form method="post" action="/register" class="stack">
    <label>Benutzername<input name="username" autocomplete="username" required></label>
    <label>Passwort<input name="password" type="password" autocomplete="new-password" required></label>
    <button>Erstellen</button>
  </form>
  <p><a href="/login">Zum Login</a></p>
</section>
{% endblock %}
