{% extends "base.html" %}
{% block content %}
<section class="hero card">
  <h1>Spielnutzer erstellen</h1>
  <p>Jeder Nutzer bekommt eigene App-Adressen. Die echte Bitcoin-Core-Wallet bleibt weiterhin dieselbe RPC-Wallet.</p>
  {% if error %}<div class="danger soft">{{ error }}</div>{% endif %}
  <form method="post" action="/register" class="stack">
    <label>Benutzername <input required name="username" autocomplete="username"></label>
    <label>Passwort <input required name="password" type="password" autocomplete="new-password"></label>
    <button class="primary">Erstellen</button>
  </form>
  <p class="muted"><a href="/login">Zurück zum Login</a></p>
</section>
{% endblock %}
